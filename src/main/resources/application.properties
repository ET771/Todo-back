# configure your datasource
quarkus.datasource.db-kind = mysql
quarkus.datasource.username = ${DB_USERNAME}
quarkus.datasource.password = ${DB_PASSWORD}
quarkus.datasource.jdbc.url = ${DB_URL}

# drop-and-create recrea el esquema al iniciar y carga import.sql con datos semilla
# cambia a `update` para persistir datos entre reinicios
quarkus.hibernate-orm.schema-management.strategy = ${DB_SCHEMA_STRATEGY:update}
quarkus.hibernate-orm.sql-load-script = import.sql

# Muestra el SQL que emite Hibernate (util para observar el N+1)
quarkus.hibernate-orm.log.sql = true
quarkus.hibernate-orm.log.format-sql = true

# Estadisticas de Hibernate para contar queries por peticion en el demo
quarkus.hibernate-orm.statistics = true

# CORS para que la guia estatica pueda llamar a los endpoints del demo
quarkus.http.cors = true
quarkus.http.cors.origins = /http.*/
quarkus.http.cors.methods = GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers = Authorization,Content-Type,Accept

firebase.credentials=${FIREBASE_CREDENTIALS_PATH}
%dev.firebase.credentials=src/main/resources/rutamx-44d01-firebase-adminsdk-fbsvc-3e86de4938.json
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0

# ===========================================================
#  Messaging: DevServices off (usamos docker-compose.messaging.yml)
# ===========================================================
quarkus.kafka.devservices.enabled=false
quarkus.rabbitmq.devservices.enabled=false

# ===========================================================
#  Messaging: Kafka — batch loader asíncrono
# ===========================================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mp.messaging.outgoing.todos-batch-out.connector=smallrye-kafka
mp.messaging.outgoing.todos-batch-out.topic=todos.batch
mp.messaging.outgoing.todos-batch-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.incoming.todos-batch-in.broadcast=true
mp.messaging.incoming.todos-batch-in.connector=smallrye-kafka
mp.messaging.incoming.todos-batch-in.topic=todos.batch
mp.messaging.incoming.todos-batch-in.group.id=equipo2-batch
mp.messaging.incoming.todos-batch-in.auto.offset.reset=earliest
mp.messaging.incoming.todos-batch-in.value.deserializer=org.acme.infrastructure.messaging.kafka.TodoBatchMessageDeserializer

# ===========================================================
#  Messaging: RabbitMQ — fanout de notificaciones
# ===========================================================
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:guest}
rabbitmq-password=${RABBITMQ_PASSWORD:guest}

mp.messaging.outgoing.todo-created-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.todo-created-out.exchange.name=todo.created
mp.messaging.outgoing.todo-created-out.exchange.type=fanout
mp.messaging.outgoing.todo-created-out.exchange.declare=true

mp.messaging.incoming.email-notifications-in.connector=smallrye-rabbitmq
mp.messaging.incoming.email-notifications-in.queue.name=todo.notifications.email
mp.messaging.incoming.email-notifications-in.queue.declare=true
mp.messaging.incoming.email-notifications-in.exchange.name=todo.created
mp.messaging.incoming.email-notifications-in.exchange.type=fanout
mp.messaging.incoming.email-notifications-in.exchange.declare=true

mp.messaging.incoming.sms-notifications-in.connector=smallrye-rabbitmq
mp.messaging.incoming.sms-notifications-in.queue.name=todo.notifications.sms
mp.messaging.incoming.sms-notifications-in.queue.declare=true
mp.messaging.incoming.sms-notifications-in.exchange.name=todo.created
mp.messaging.incoming.sms-notifications-in.exchange.type=fanout
mp.messaging.incoming.sms-notifications-in.exchange.declare=true

mp.messaging.incoming.push-notifications-in.connector=smallrye-rabbitmq
mp.messaging.incoming.push-notifications-in.queue.name=todo.notifications.push
mp.messaging.incoming.push-notifications-in.queue.declare=true
mp.messaging.incoming.push-notifications-in.exchange.name=todo.created
mp.messaging.incoming.push-notifications-in.exchange.type=fanout
mp.messaging.incoming.push-notifications-in.exchange.declare=true

# Logging de mensajería
quarkus.log.category."org.acme.infrastructure.messaging".level=DEBUG

# Test profile: H2 in-memory database
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
%test.quarkus.datasource.jdbc.driver=org.h2.Driver
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Tests: in-memory para no necesitar brokers reales
%test.mp.messaging.outgoing.todos-batch-out.connector=smallrye-in-memory
%test.mp.messaging.incoming.todos-batch-in.connector=smallrye-in-memory
%test.mp.messaging.outgoing.todo-created-out.connector=smallrye-in-memory
%test.mp.messaging.incoming.email-notifications-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.sms-notifications-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.push-notifications-in.connector=smallrye-in-memory
